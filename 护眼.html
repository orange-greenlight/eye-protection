<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>护眼小卫士 · 21天打卡挑战</title>
    <!-- Font Awesome 6 (免费版) 用于图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #c8e6d9 0%, #e0f2e9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .challenge-card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 25px 40px -10px rgba(30, 70, 50, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.7);
            padding: 32px 28px;
            transition: all 0.2s;
            border: 1px solid rgba(150, 200, 160, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #1a4d3e;
            line-height: 1.2;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .glasses-icon {
            background: #f5b342;
            color: #2d5a3b;
            font-size: 1.8rem;
            width: 60px;
            height: 60px;
            border-radius: 30px 30px 30px 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-5deg);
            box-shadow: 0 6px 0 #b47d2e;
        }

        .subhead {
            font-size: 1.2rem;
            font-weight: 500;
            color: #2b6b4f;
            margin-left: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 6px solid #5fa880;
            padding-left: 18px;
            background: linear-gradient(to right, transparent, rgba(95, 168, 128, 0.1));
            border-radius: 0 40px 40px 0;
        }

        .subhead i {
            color: #e68a3e;
            font-size: 1.4rem;
        }

        .progress-row {
            background: #d9ead3;
            border-radius: 60px;
            padding: 14px 24px;
            margin: 24px 0 28px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.05), 0 8px 12px -8px #3b6e4e;
            border: 1px solid #a6c9b2;
        }

        .progress-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1d523b;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .progress-text span {
            font-size: 2.2rem;
            font-weight: 800;
            color: #276749;
            background: white;
            padding: 0 12px;
            border-radius: 40px;
            margin: 0 4px;
            border: 2px solid #7fb091;
            line-height: 1.3;
            min-width: 60px;
            text-align: center;
        }

        .progress-badge {
            background: #f7ffe0;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #3d6e52;
            border: 1px dashed #7bb896;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 14px;
            margin: 24px 0 20px;
        }

        .grid-item {
            background: #f9fffbf0;
            border: 3px solid #bfdec5;
            border-radius: 24px;
            aspect-ratio: 1 / 1.1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 6px 0 #96b89f, 0 6px 12px rgba(40, 80, 50, 0.2);
            padding: 8px 4px;
            color: #1b4c33;
            font-weight: 600;
            font-size: 1.1rem;
            user-select: none;
            line-height: 1.3;
        }

        .grid-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #7fa588, 0 10px 18px rgba(40, 100, 60, 0.25);
            background: #ffffff;
        }

        .grid-item.completed {
            background: #2a7a4b;
            border-color: #155c31;
            color: white;
            box-shadow: 0 6px 0 #0d4529, 0 6px 12px #1d5f3e;
        }

        .grid-item.completed span {
            color: white;
            font-weight: 700;
            text-shadow: 0 2px 2px #0b4a1e;
        }

        .grid-item i {
            font-size: 1.4rem;
            margin-top: 6px;
            filter: drop-shadow(0 2px 2px rgba(0,50,0,0.3));
        }

        .grid-item span {
            font-size: 1rem;
            font-weight: 600;
        }

        /* 勋章区域 */
        .medal-section {
            background: #fffae7;
            border-radius: 60px;
            padding: 24px 28px;
            margin: 24px 0 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            border: 3px solid #f5c542;
            box-shadow: 0 8px 0 #c49b2b, 0 12px 20px -8px #7b6b2e;
            transition: all 0.3s;
        }

        .medal-section.hidden {
            display: none;
        }

        .medal-icon {
            font-size: 5rem;
            color: #f5b342;
            filter: drop-shadow(0 6px 0 #b87e1e);
            line-height: 1;
        }

        .medal-text {
            font-size: 2rem;
            font-weight: 800;
            color: #2d572c;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #3f7849, #b8862c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 4px rgba(255,255,200,0.8);
        }

        .medal-sub {
            font-size: 1.2rem;
            font-weight: 500;
            color: #734d1a;
            display: block;
            margin-top: 4px;
        }

        .reset-btn {
            background: #ffe5c4;
            border: none;
            border-radius: 48px;
            padding: 18px 36px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #2e5d41;
            border-bottom: 6px solid #c2a578;
            cursor: pointer;
            transition: 0.08s linear;
            width: fit-content;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 12px 18px -10px #526e5b;
            border: 1px solid #fbeab6;
        }

        .reset-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }

        .reset-btn i {
            font-size: 1.6rem;
            color: #6a4e27;
        }

        .footer-note {
            text-align: center;
            margin-top: 16px;
            color: #41755a;
            font-weight: 500;
            font-size: 0.95rem;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer-note i {
            color: #e57637;
        }

        /* 小眼镜不存在的点缀 */
        .no-glasses {
            display: inline-block;
            background: #f35f5f;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            text-align: center;
            line-height: 28px;
            font-size: 1rem;
            margin-left: 6px;
        }

        @media (max-width: 550px) {
            .challenge-card { padding: 22px 16px; }
            h1 { font-size: 1.8rem; }
            .grid { gap: 8px; }
            .grid-item { border-radius: 18px; }
            .grid-item span { font-size: 0.85rem; }
            .grid-item i { font-size: 1.2rem; }
            .medal-icon { font-size: 3.5rem; }
            .medal-text { font-size: 1.6rem; }
            .reset-btn { padding: 14px 28px; font-size: 1.2rem; }
        }

        @media (max-width: 380px) {
            .grid-item span { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="challenge-card">
        <h1>
            <span>争做护眼小卫士</span>
            <span class="glasses-icon"><i class="fa-solid fa-glasses"></i></span>
        </h1>
        <div class="subhead">
            <i class="fa-regular fa-eye"></i> 不做“小眼镜”护眼卫士 · 21天挑战
            <span class="no-glasses"><i class="fa-solid fa-ban"></i></span>
        </div>

        <!-- 进度显示 -->
        <div class="progress-row">
            <div class="progress-text">
                <i class="fa-regular fa-calendar-check"></i> 已打卡 <span id="counterDisplay">0</span> / 21
            </div>
            <div class="progress-badge">
                <i class="fa-regular fa-star"></i> 距离勋章还差 <span id="remainDays">21</span> 天
            </div>
        </div>

        <!-- 21天打卡网格容器 -->
        <div id="gridContainer" class="grid"></div>

        <!-- 勋章区域 (默认隐藏) -->
        <div id="medalBox" class="medal-section hidden">
            <div class="medal-icon"><i class="fa-solid fa-medal"></i></div>
            <div class="medal-text">
                🛡️ 护眼小卫士 🛡️
                <span class="medal-sub">你已坚持21天！亮眼勋章属于你</span>
            </div>
            <div class="medal-icon"><i class="fa-solid fa-eye"></i></div>
        </div>

        <!-- 重置按钮 -->
        <button class="reset-btn" id="resetButton">
            <i class="fa-solid fa-rotate-left"></i> 重置挑战 <i class="fa-regular fa-clock"></i>
        </button>

        <div class="footer-note">
            <i class="fa-regular fa-lightbulb"></i> 点击每日格子打卡，点亮21天获得勋章 <i class="fa-regular fa-face-smile"></i>
        </div>
    </div>

    <script>
        (function() {
            // 总天数
            const TOTAL_DAYS = 21;

            // 获取DOM元素
            const gridEl = document.getElementById('gridContainer');
            const counterSpan = document.getElementById('counterDisplay');
            const remainSpan = document.getElementById('remainDays');
            const medalBox = document.getElementById('medalBox');
            const resetBtn = document.getElementById('resetButton');

            // 当前打卡状态 (长度为21的布尔数组)
            let daysState = [];

            // ---------- 初始化状态(从localStorage读取) ----------
            function loadState() {
                const stored = localStorage.getItem('eyeGuardian21');
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed) && parsed.length === TOTAL_DAYS && parsed.every(v => typeof v === 'boolean')) {
                            daysState = parsed;
                            return;
                        }
                    } catch (e) {
                        // 解析失败，忽略
                    }
                }
                // 默认全false
                daysState = new Array(TOTAL_DAYS).fill(false);
            }

            // 保存状态到localStorage
            function saveState() {
                localStorage.setItem('eyeGuardian21', JSON.stringify(daysState));
            }

            // ---------- 渲染网格和进度 ----------
            function render() {
                // 清空网格，重新生成
                gridEl.innerHTML = '';

                for (let i = 0; i < TOTAL_DAYS; i++) {
                    const dayNumber = i + 1;
                    const isCompleted = daysState[i];

                    const dayDiv = document.createElement('div');
                    dayDiv.className = `grid-item ${isCompleted ? 'completed' : ''}`;
                    dayDiv.setAttribute('data-index', i);

                    // 显示内容: Day + 勾选图标(如果已完成)
                    const daySpan = document.createElement('span');
                    daySpan.textContent = `Day ${dayNumber}`;

                    dayDiv.appendChild(daySpan);

                    if (isCompleted) {
                        const checkIcon = document.createElement('i');
                        checkIcon.className = 'fa-solid fa-check-circle'; // 使用清晰的勾图标
                        dayDiv.appendChild(checkIcon);
                    } else {
                        // 未完成也可以放一个淡淡的占位? 不加东西保持简洁
                        // 但为了统一高度，加一个零宽度的占位? 不加更干净
                    }

                    gridEl.appendChild(dayDiv);
                }

                // 更新计数
                const completedCount = daysState.filter(v => v).length;
                counterSpan.textContent = completedCount;
                const remain = TOTAL_DAYS - completedCount;
                remainSpan.textContent = remain;

                // 根据完成度显示/隐藏勋章
                if (completedCount === TOTAL_DAYS) {
                    medalBox.classList.remove('hidden');
                } else {
                    medalBox.classList.add('hidden');
                }
            }

            // ---------- 处理打卡点击 (事件代理) ----------
            function handleGridClick(e) {
                // 找到实际点击的格子元素
                const target = e.target.closest('.grid-item');
                if (!target) return; // 点到了空白区域

                const index = target.getAttribute('data-index');
                if (index === null) return;

                const dayIdx = parseInt(index, 10);

                // 只有当前未打卡的才能打卡 (已打卡的不可逆)
                if (!daysState[dayIdx]) {
                    // 打卡: 设置为true
                    daysState[dayIdx] = true;
                    // 保存到localStorage
                    saveState();
                    // 重新渲染界面
                    render();
                }
                // 已打卡的点击不做任何变化 (保持不可逆)
            }

            // ---------- 重置挑战 (清空所有打卡) ----------
            function resetChallenge() {
                const confirmReset = confirm('确定要重置21天挑战吗？所有打卡记录将消失。');
                if (!confirmReset) return;

                // 全部置为false
                for (let i = 0; i < TOTAL_DAYS; i++) {
                    daysState[i] = false;
                }
                saveState();
                render();
            }

            // ---------- 绑定事件 ----------
            gridEl.addEventListener('click', handleGridClick);
            resetBtn.addEventListener('click', resetChallenge);

            // 启动: 加载状态 + 渲染
            loadState();
            render();

            // 可选: 在页面关闭前无需额外操作，每次修改都save了。
            // 确保localStorage写入
            window.addEventListener('beforeunload', function() {
                saveState(); // 保险，但每次点击已经保存了
            });
        })();
    </script>
</body>
</html>
